<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yıldız Hub | Giriş Paneli</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .split-container {
            display: flex;
            height: 100%;
            width: 100%;
        }

        .split {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            transition: all 0.5s ease;
            position: relative;
            color: white;
            overflow: hidden;
        }

        /* Sol Taraf: Dernekler */
        .dernek {
            background: linear-gradient(rgba(0, 0, 50, 0.7), rgba(0, 0, 50, 0.7)), 
                        url('dernek_arka_plan.jpg') center/cover no-repeat;
            border-right: 2px solid rgba(255, 255, 255, 0.1);
        }

        /* Sağ Taraf: Nakliyeciler (Senin Tır Resmin) */
        .nakliye {
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('tir.jpg') center/cover no-repeat;
        }

        .split:hover {
            flex: 1.2; /* Üzerine gelince genişler */
            filter: brightness(1.2);
        }

        .content {
            z-index: 2;
            text-align: center;
            padding: 20px;
        }

        .content h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .btn {
            padding: 15px 40px;
            border: 2px solid white;
            background: transparent;
            color: white;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .split:hover .btn {
            background: white;
            color: black;
        }

        .logo-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            background: #FFD700;
            color: black;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 5px;
            pointer-events: none; /* Tıklamayı engellemez */
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="logo-center">YILDIZ HUB</div>

    <div class="split-container">
        <a href="dernek-giris.html" class="split dernek">
            <div class="content">
                <h2>Dernekler Platformu</h2>
                <div class="btn">Giriş Yap</div>
            </div>
        </a>

        <a href="nakliye-giris.html" class="split nakliye">
            <div class="content">
                <h2>Nakliyeciler Platformu</h2>
                <div class="btn">Giriş Yap</div>
            </div>
        </a>
    </div>

</body>
</html>
